<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f0f0f0;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-top: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        form {
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }

        .gender-label {
            display: inline;
            margin-left: 15px;
            margin-top: 0;
            font-weight: normal;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #999;
            box-sizing: border-box;
        }

        input[type="radio"] {
            margin-right: 5px;
            margin-left: 10px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background: #0056b3;
        }

        p {
    
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
            color: #333;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 2px solid #ccc;
        }
    </style>
</head>

<body>
    
    <h1>Please Fill the form</h1>
    <form id="userForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label>Gender:</label>
        <label for="genderMale" class="gender-label">Male</label>
        <input type="radio" id="genderMale" name="gender" value="Male">
        <label for="genderFemale" class="gender-label">Female</label>
        <input type="radio" id="genderFemale" name="gender" value="Female"><br><br>

        <label for="DOB">Date of Birth:</label>
        <input type="date" id="DOB" name="DOB"><br><br>

        <input type="submit" value="Submit">
    </form>

    <hr>
    <h2>Live Preview</h2>
    <p id="previewText">Start typing in the form to see dynamic content.</p>

    <h2>Submission Status</h2>
    <p id="statusText">Form not submitted yet.</p>

    <script>
        const form = document.getElementById('userForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const dobInput = document.getElementById('DOB');
        const genderInputs = document.querySelectorAll('input[name="gender"]');
        const previewText = document.getElementById('previewText');
        const statusText = document.getElementById('statusText');

        function getSelectedGender() {
            const selected = document.querySelector('input[name="gender"]:checked');
            return selected ? selected.value : 'Not selected';
        }

        function updatePreview() {
            const name = nameInput.value.trim() || 'Anonymous';
            const email = emailInput.value.trim() || 'No email entered';
            const dob = dobInput.value || 'Not selected';
            const gender = getSelectedGender();

            previewText.textContent =
                `Name: ${name} | Email: ${email} | Gender: ${gender} | DOB: ${dob}`;
        }

        nameInput.addEventListener('input', updatePreview);
        emailInput.addEventListener('input', updatePreview);
        dobInput.addEventListener('change', updatePreview);
        genderInputs.forEach((input) => input.addEventListener('change', updatePreview));

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            updatePreview();
            statusText.textContent = 'Form submitted successfully!';
        });
    </script>
</body>
</html>
