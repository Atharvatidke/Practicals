<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        .info {
            background-color: white;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #4CAF50;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border: 1px solid #ddd;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Welcome</h1>
    
    <div class="info">
        <strong>Current Date and Time:</strong><br>
        <span id="dateTime"></span>
    </div>
    
    <div class="info">
        <strong>Date (YYYY-MM-DD):</strong><br>
        <span id="dateOnly"></span>
    </div>
    
    <div class="info">
        <strong>Time (HH:MM:SS):</strong><br>
        <span id="timeOnly"></span>
    </div>
    
    <h2>PHP Code:</h2>
    <pre>
&lt;?php
    echo "Welcome!";
    echo date("Y-m-d");     // 2025-04-24
    echo date("H:i:s");     // 14:30:45
    echo date("l, F j, Y"); // Thursday, April 24, 2025
?&gt;
    </pre>
    
    <script>
        function updateDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');
            
            const dayName = now.toLocaleString('en-US', { weekday: 'long' });
            const monthName = now.toLocaleString('en-US', { month: 'long' });
            
            document.getElementById('dateTime').textContent = dayName + ', ' + monthName + ' ' + day + ', ' + year + ' - ' + hours + ':' + mins + ':' + secs;
            document.getElementById('dateOnly').textContent = year + '-' + month + '-' + day;
            document.getElementById('timeOnly').textContent = hours + ':' + mins + ':' + secs;
        }
        
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
