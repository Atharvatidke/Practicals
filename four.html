<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        
        form {
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
        }
        
        h1 {
            text-align: center;
            color: #333;
        }
        
        label {
            display: block;
            margin: 10px 0 5px 0;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #999;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        .error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .success {
            color: green;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Form Validation</h1>
    
    <form id="myForm">
        <label>Full Name:</label>
        <input type="text" id="name" name="name">
        
        <label>Email:</label>
        <input type="text" id="email" name="email">
        
        <label>Phone:</label>
        <input type="text" id="phone" name="phone">
        
        <button type="submit">Submit</button>
    </form>
    
    <div id="message"></div>
    
    <script>
        document.getElementById('myForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let name = document.getElementById('name').value;
            let email = document.getElementById('email').value;
            let phone = document.getElementById('phone').value;
            let msg = document.getElementById('message');
            
            if (name == '') {
                msg.innerHTML = 'Name cannot be empty!';
                msg.className = 'error';
                return;
            }
            
            if (!validateName(name)) {
                msg.innerHTML = 'Name can only contain letters!';
                msg.className = 'error';
                return;
            }
            
            if (email == '') {
                msg.innerHTML = 'Email cannot be empty!';
                msg.className = 'error';
                return;
            }
            
            if (!validateEmail(email)) {
                msg.innerHTML = 'Email is invalid!';
                msg.className = 'error';
                return;
            }
            
            if (phone == '') {
                msg.innerHTML = 'Phone cannot be empty!';
                msg.className = 'error';
                return;
            }
            
            if (!validatePhone(phone)) {
                msg.innerHTML = 'Phone can only contain numbers!';
                msg.className = 'error';
                return;
            }
            
            msg.innerHTML = 'Form submitted successfully!';
            msg.className = 'success';
            document.getElementById('myForm').reset();
        });
        
        function validateEmail(email) {
            if (email.includes('@') && email.includes('.')) {
                return true;
            }
            return false;
        }
        
        function validateName(name) {
            let letters = /^[a-zA-Z\s]+$/;
            return letters.test(name);
        }
        
        function validatePhone(phone) {
            let numbers = /^[0-9]+$/;
            return numbers.test(phone);
        }
    </script>
</body>
</html>
